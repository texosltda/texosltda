<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texos | Transporte y Logistica</title>
    <style>
        :root { --celeste: #4fb3e8; --azul-oscuro: #1a5a7a; }
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background: white; padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo-box { display: flex; align-items: center; }
        .logo-box img { height: 50px; margin-right: 10px; }
        .hero { 
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('imagen-fondo.jpg'); 
            height: 450px; background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center;
        }
        .section { padding: 50px 10%; text-align: center; }
        .btn-ws { background: #25d366; color: white; padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <div class="logo-box">
            <img src="logo.jpg" alt="Logo Texos">
            <span style="font-size: 24px; font-weight: bold; color: var(--azul-oscuro);">TEXOS</span>
        </div>
    </header>
    <section class="hero">
        <h1>Log&iacute;stica Responsable</h1>
        <p>Seguridad y confianza en cada kil&oacute;metro.</p>
    </section>
    <section class="section">
        <h2>Contacto Directo</h2>
        <br><br>
        <a href="https://wa.me/TUNUMERO" class="btn-ws">Escribir por WhatsApp</a>
    </section>
</body>
</html>
